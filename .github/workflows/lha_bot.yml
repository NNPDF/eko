# A single CI script with github workflow.
name: LHA Benchmarks

on:
  push:
    branches-ignore:
      - "*"
    tags:
  pull_request:
    types:
      - closed
      - ready_for_review
      - review_requested
  workflow_dispatch:

jobs:
  lhabench:
    name: LHA paper Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          # tags needed for dynamic versioning
          fetch-depth: 0
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION_WORKFLOWS }}
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false
          installer-parallel: true
      - name: Install project
        run: |
          poetry install --no-interaction --with test -E mark -E box
      - name: Install task runner
        run: pip install poethepoet
      - name: Run benchmark
        run: |
          poe lha -m "nnlo and sv"
          poe lha -m "ffns_pol and sv"
